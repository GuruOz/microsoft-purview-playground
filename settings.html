<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.openai.com https://generativelanguage.googleapis.com https://api.anthropic.com https://api.deepseek.com; img-src 'self' data:; font-src 'self' data:;">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <title>Settings - Purview Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
        if (localStorage.getItem('dlp_theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100 p-6 font-sans transition-colors duration-200">
    
    <div class="w-full mx-auto space-y-6">
        
        <!-- Header -->
        <div class="bg-white dark:bg-gray-800 p-4 rounded shadow-sm border border-gray-200 dark:border-gray-700 flex flex-wrap justify-between items-center gap-y-3">
            <div id="appBrand" data-page="Settings"></div>
            
            <div class="flex flex-wrap gap-x-6 gap-y-3 items-center">
                <!-- Navigation -->
                <nav id="appNav" data-active="settings" class="flex flex-wrap items-center gap-x-4 gap-y-2 text-sm font-semibold"></nav>

                <div class="flex gap-3 items-center">
                    <button onclick="toggleTheme()" class="text-gray-500 dark:text-gray-300 hover:text-gray-800 dark:hover:text-white" title="Toggle Dark Mode">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="bg-white dark:bg-gray-800 p-6 rounded shadow-sm border border-gray-200 dark:border-gray-700 max-w-2xl mx-auto space-y-6">
            
            <h2 class="text-lg font-bold text-gray-800 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-2">Natural Language Processing</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Rule Explanation Mode</label>
                    <select id="nlModeSelect" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white p-2 rounded text-sm focus:outline-none focus:border-indigo-500 mb-4">
                        <option value="static">Static: "Rule applies when [Condition]..."</option>
                        <option value="ai">AI Generated</option>
                    </select>

                    <div class="flex items-center gap-2 mt-4">
                        <input type="checkbox" id="enableAITraceCheckbox" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <label for="enableAITraceCheckbox" class="text-sm font-semibold text-gray-700 dark:text-gray-300">Enable On-Demand AI Explanations in Truth Table</label>
                    </div>
                </div>

                <div id="aiConfigSection" class="space-y-4 hidden p-4 border border-indigo-200 dark:border-indigo-800 bg-indigo-50 dark:bg-indigo-900/20 rounded">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">AI Provider</label>
                        <select id="aiProviderSelect" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white p-2 rounded text-sm focus:outline-none focus:border-indigo-500">
                            <option value="openai">OpenAI (GPT-4o-mini)</option>
                            <option value="gemini">Google Gemini (1.5 Flash)</option>
                            <option value="claude">Anthropic Claude (3 Haiku)</option>
                            <option value="deepseek">DeepSeek (Chat)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">API Key</label>
                        <input type="password" id="aiApiKeyInput" class="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white p-2 rounded text-sm focus:outline-none focus:border-indigo-500" placeholder="Enter your API key...">
                        <p class="text-xs text-green-600 dark:text-green-400 mt-2 font-semibold flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z"></path></svg>
                            Your API key is stored in session memory only — it is cleared when you close the browser tab and is never saved to disk, exported, or included in share links.
                        </p>
                    </div>
                </div>
            </div>

            <div class="pt-4 border-t border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <button onclick="window.downloadLogs()" class="text-sm font-semibold text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download Debug Logs
                </button>
                <button id="saveSettingsBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded text-sm font-semibold shadow transition-colors">Save Settings</button>
            </div>
            
            <div id="settingsToastContainer"></div>
        </div>

        <div class="bg-white dark:bg-gray-800 p-6 rounded shadow-sm border border-gray-200 dark:border-gray-700 max-w-2xl mx-auto space-y-4">
            <div class="flex justify-between items-center border-b border-gray-200 dark:border-gray-700 pb-2">
                <h2 class="text-lg font-bold text-gray-800 dark:text-white">Live Debug Logs</h2>
                <div class="flex gap-4">
                    <button onclick="window.clearDebugLogs()" class="text-sm font-semibold text-red-600 dark:text-red-400 hover:underline">Clear Logs</button>
                    <button onclick="window.refreshLogViewer()" class="text-sm font-semibold text-indigo-600 dark:text-indigo-400 hover:underline">Refresh</button>
                </div>
            </div>
            <div id="debugLogViewer" class="bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 p-3 rounded h-64 overflow-y-auto font-mono text-xs text-gray-800 dark:text-gray-300 whitespace-pre-wrap break-all">
                Loading logs...
            </div>
        </div>

    </div>

    <!-- Theme Toggling support -->
    <script>
        window.toggleTheme = function() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('dlp_theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('dlp_theme', 'dark');
            }
        };
    </script>
    <script src="js/version.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/logger.js"></script>
    <script src="js/nl-generator.js"></script>
    <script src="js/settings-ui.js"></script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});</script>
    <footer class="text-center text-xs text-gray-400 dark:text-gray-600 py-3" role="contentinfo">
        Purview Playground &mdash; <span id="appVersionFooter"></span>
        <script>document.getElementById('appVersionFooter').textContent = 'v' + (window.APP_VERSION || '1.0.0');</script>
    </footer>
</body>
</html>
